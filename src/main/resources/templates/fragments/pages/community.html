<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="community">

<!-- 커뮤니티 목록 -->
<div id="page-community" class="page pt-16 flex-col min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-10 w-full flex-1">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold mb-1">커뮤니티</h1>
        <p class="text-sm text-muted-foreground">복지 신청 후기와 정보를 함께 나눠요</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="openBadgeShop()" class="flex items-center gap-1.5 px-4 py-2.5 bg-card border border-border rounded-xl text-sm text-muted-foreground hover:text-primary hover:border-primary/40 transition-all font-medium">
          🏅 뱃지 샵
        </button>
        <button id="btn-write-post" onclick="goWritePost()" class="hidden items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-primary to-cyan-400 text-background font-semibold rounded-xl text-sm hover:shadow-lg hover:shadow-primary/30 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          글쓰기
        </button>
      </div>
    </div>
    <div class="flex items-center gap-0 border-b border-border mb-6">
      <div id="board-tabs" class="flex items-center gap-0"></div>
      <button id="btn-add-board" onclick="openAddBoard()" class="hidden ml-auto mr-0 px-3 py-2 text-xs text-primary hover:bg-primary/10 rounded-lg transition-colors flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        게시판 추가
      </button>
    </div>
    <div class="flex gap-3 mb-5">
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
        <input id="board-search" type="text" placeholder="제목 또는 내용 검색..." onkeyup="renderBoard()" class="w-full bg-card border border-border rounded-xl pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:border-primary transition-colors">
      </div>
    </div>
    <div class="bg-card border border-border rounded-2xl overflow-hidden mb-6">
      <div class="grid text-xs text-muted-foreground font-medium px-5 py-3 border-b border-border bg-muted/20" style="grid-template-columns:60px 1fr 100px 70px 60px 60px">
        <span>번호</span><span>제목</span><span>작성자</span><span class="text-center">날짜</span><span class="text-center">조회</span><span class="text-center">댓글</span>
      </div>
      <div id="post-list-body"></div>
    </div>
    <div id="pagination" class="flex justify-center gap-1.5"></div>
  </div>
</div>

<!-- 게시글 상세 -->
<div id="page-post-detail" class="page pt-16 min-h-screen">
  <div class="max-w-3xl mx-auto px-6 py-10">
    <button onclick="goPage('community')" class="flex items-center gap-2 text-sm text-muted-foreground hover:text-foreground mb-6 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      목록으로
    </button>
    <div id="post-detail-content"></div>
    <div class="mt-10">
      <h3 class="text-lg font-bold mb-5" id="comment-count-label">댓글</h3>
      <div id="comment-list" class="space-y-4 mb-6"></div>
      <div id="comment-form-wrap" class="hidden">
        <div class="bg-card border border-border rounded-2xl p-5">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-xs font-bold text-primary" id="comment-avatar"></div>
            <span class="text-sm font-medium" id="comment-author-name"></span>
          </div>
          <textarea id="comment-input" rows="3" placeholder="댓글을 입력하세요..." class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none mb-3"></textarea>
          <div class="flex justify-end">
            <button onclick="submitComment(null)" class="px-5 py-2 bg-primary text-background text-sm font-semibold rounded-xl hover:bg-primary-hover transition-colors">등록</button>
          </div>
        </div>
      </div>
      <div id="comment-login-notice" class="hidden text-center py-8 text-sm text-muted-foreground">
        <span>댓글을 작성하려면 </span><button onclick="openModal('modal-login')" class="text-primary hover:underline">로그인</button><span>하세요</span>
      </div>
    </div>
  </div>
</div>

<!-- 글쓰기/수정 -->
<div id="page-post-write" class="page pt-16 min-h-screen">
  <div class="max-w-3xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
      <h1 id="write-page-title" class="text-2xl font-bold">글쓰기</h1>
      <button onclick="goPage('community')" class="text-sm text-muted-foreground hover:text-foreground transition-colors">취소</button>
    </div>
    <div class="bg-card border border-border rounded-2xl p-6 space-y-5">
      <div>
        <label class="text-xs text-muted-foreground mb-1.5 block">게시판</label>
        <select id="write-board" class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary transition-colors"></select>
      </div>
      <div>
        <label class="text-xs text-muted-foreground mb-1.5 block">제목 <span class="text-destructive">*</span></label>
        <input id="write-title" type="text" placeholder="제목을 입력하세요" class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
      </div>
      <div>
        <label class="text-xs text-muted-foreground mb-1.5 block">내용 <span class="text-destructive">*</span></label>
        <textarea id="write-content" rows="12" placeholder="내용을 입력하세요..." class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none"></textarea>
      </div>
      <div id="write-err" class="hidden text-xs text-destructive bg-destructive/10 rounded-lg px-3 py-2"></div>
      <div class="flex justify-end gap-3 pt-2">
        <button onclick="goPage('community')" class="px-6 py-2.5 border border-border rounded-xl text-sm hover:bg-muted/50 transition-colors">취소</button>
        <button onclick="submitPost()" class="px-6 py-2.5 bg-gradient-to-r from-primary to-cyan-400 text-background font-semibold rounded-xl text-sm hover:shadow-lg hover:shadow-primary/30 transition-all" id="write-submit-btn">등록</button>
      </div>
    </div>
  </div>
</div>

<!-- 게시판 추가 모달 -->
<div id="modal-add-board" class="modal-overlay" onclick="handleOverlayClick(event,'modal-add-board')">
  <div class="modal-box w-full max-w-sm mx-4 bg-card border border-border rounded-2xl p-8">
    <h2 class="text-lg font-bold mb-5">게시판 추가</h2>
    <div class="space-y-4">
      <div>
        <label class="text-xs text-muted-foreground mb-1.5 block">게시판 이름</label>
        <input id="new-board-name" type="text" placeholder="게시판 이름 입력" class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary transition-colors">
      </div>
      <div class="flex items-center gap-3">
        <input id="new-board-admin-only" type="checkbox" class="w-4 h-4 accent-primary">
        <label class="text-sm text-muted-foreground">관리자만 글쓰기 가능 (공지전용)</label>
      </div>
      <div class="flex gap-3 pt-2">
        <button onclick="closeModal('modal-add-board')" class="flex-1 py-2.5 border border-border rounded-xl text-sm hover:bg-muted/50 transition-colors">취소</button>
        <button onclick="doAddBoard()" class="flex-1 py-2.5 bg-primary text-background font-semibold rounded-xl text-sm hover:bg-primary-hover transition-colors">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- 타임아웃 모달 -->
<div id="modal-timeout" class="modal-overlay" onclick="handleOverlayClick(event,'modal-timeout')">
  <div class="modal-box w-full max-w-sm mx-4 bg-card border border-border rounded-2xl p-8">
    <h2 class="text-lg font-bold mb-2">타임아웃(정지)</h2>
    <p class="text-sm text-muted-foreground mb-5">정지 기간을 선택하세요</p>
    <div class="space-y-3 mb-5">
      <label class="flex items-center gap-3 p-3 border border-border rounded-xl cursor-pointer hover:border-primary/40 transition-colors"><input type="radio" name="timeout-dur" value="1" class="accent-primary"> <span class="text-sm">1일</span></label>
      <label class="flex items-center gap-3 p-3 border border-border rounded-xl cursor-pointer hover:border-primary/40 transition-colors"><input type="radio" name="timeout-dur" value="7" class="accent-primary" checked> <span class="text-sm">7일</span></label>
      <label class="flex items-center gap-3 p-3 border border-border rounded-xl cursor-pointer hover:border-primary/40 transition-colors"><input type="radio" name="timeout-dur" value="30" class="accent-primary"> <span class="text-sm">30일</span></label>
    </div>
    <input id="timeout-target-id" type="hidden">
    <div class="flex gap-3">
      <button onclick="closeModal('modal-timeout')" class="flex-1 py-2.5 border border-border rounded-xl text-sm hover:bg-muted/50 transition-colors">취소</button>
      <button onclick="doTimeout()" class="flex-1 py-2.5 bg-warning text-background font-semibold rounded-xl text-sm">정지 적용</button>
    </div>
  </div>
</div>

<!-- 대댓글 모달 -->
<div id="modal-reply" class="modal-overlay" onclick="handleOverlayClick(event,'modal-reply')">
  <div class="modal-box w-full max-w-md mx-4 bg-card border border-border rounded-2xl p-6">
    <h2 class="text-base font-bold mb-1">대댓글 작성</h2>
    <p class="text-xs text-muted-foreground mb-4" id="reply-to-label"></p>
    <textarea id="reply-input" rows="3" placeholder="대댓글을 입력하세요..." class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none mb-3"></textarea>
    <input id="reply-target-comment-id" type="hidden">
    <div class="flex justify-end gap-3">
      <button onclick="closeModal('modal-reply')" class="px-5 py-2 border border-border rounded-xl text-sm hover:bg-muted/50 transition-colors">취소</button>
      <button onclick="submitReply()" class="px-5 py-2 bg-primary text-background text-sm font-semibold rounded-xl hover:bg-primary-hover transition-colors">등록</button>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
