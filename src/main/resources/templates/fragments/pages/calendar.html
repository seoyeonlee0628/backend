<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="calendar" id="page-calendar" class="page pt-16 min-h-screen">
  <div class="max-w-3xl mx-auto px-6 py-10">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold mb-1">📅 내 혜택 캘린더</h1>
        <p class="text-sm text-muted-foreground">찜한 혜택의 신청 기간을 확인하세요</p>
      </div>
      <button onclick="goPage('home')" class="text-sm text-muted-foreground hover:text-foreground transition-colors">← 홈으로</button>
    </div>
    <div class="flex items-center justify-between mb-6">
      <button onclick="changeCalMonth(-1)" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center hover:bg-muted/50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h2 id="cal-title" class="text-lg font-bold"></h2>
      <button onclick="changeCalMonth(1)" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center hover:bg-muted/50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
    <div class="bg-card border border-border rounded-2xl overflow-hidden mb-6">
      <div class="grid grid-cols-7 border-b border-border">
        <div class="text-center py-3 text-xs text-rose-400 font-medium">일</div>
        <div class="text-center py-3 text-xs text-muted-foreground font-medium">월</div>
        <div class="text-center py-3 text-xs text-muted-foreground font-medium">화</div>
        <div class="text-center py-3 text-xs text-muted-foreground font-medium">수</div>
        <div class="text-center py-3 text-xs text-muted-foreground font-medium">목</div>
        <div class="text-center py-3 text-xs text-muted-foreground font-medium">금</div>
        <div class="text-center py-3 text-xs text-blue-400 font-medium">토</div>
      </div>
      <div id="cal-grid"></div>
    </div>
    <div>
      <h3 class="font-semibold mb-4 text-sm">찜한 혜택 목록 <span id="wish-count" class="text-primary ml-1">0</span></h3>
      <div id="wish-list" class="space-y-3"></div>
      <div class="mt-4 p-4 bg-muted/20 rounded-xl border border-border">
        <div class="text-xs font-semibold text-muted-foreground mb-2 uppercase tracking-wider">예상 수혜 총액</div>
        <div id="total-benefit-calc" class="text-xl font-bold text-primary">—</div>
        <div class="text-xs text-muted-foreground mt-1">찜한 혜택 기준 연간 최대 예상액</div>
      </div>
      <div id="wish-empty" class="text-center py-12 text-muted-foreground text-sm hidden">
        아직 찜한 혜택이 없어요<br>
        <button onclick="requireLoginThenDiagnosis()" class="mt-3 text-primary hover:underline text-sm">복지 진단하러 가기 →</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
