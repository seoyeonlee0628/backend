<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="admin" id="page-admin" class="page pt-16 min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-10">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-destructive/10 flex items-center justify-center">
        <svg class="w-5 h-5 text-destructive" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <div>
        <h1 class="text-2xl font-bold">관리자 패널</h1>
        <p class="text-xs text-muted-foreground">admin 전용</p>
      </div>
    </div>
    <div class="flex gap-0 border-b border-border mb-7">
      <button onclick="switchAdminTab('boards')" class="tab-btn admin-tab px-5 py-3 text-sm font-medium text-muted-foreground active" data-tab="boards">게시판 관리</button>
      <button onclick="switchAdminTab('users')" class="tab-btn admin-tab px-5 py-3 text-sm font-medium text-muted-foreground" data-tab="users">회원 관리</button>
    </div>
    <div id="admin-tab-boards">
      <div class="bg-card border border-border rounded-2xl overflow-hidden mb-5">
        <div class="px-6 py-4 border-b border-border flex items-center justify-between">
          <span class="font-semibold">게시판 목록</span>
          <button onclick="openAddBoard()" class="flex items-center gap-1.5 px-4 py-2 bg-primary/10 text-primary text-sm rounded-xl hover:bg-primary/20 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            게시판 추가
          </button>
        </div>
        <div id="admin-board-list"></div>
      </div>
    </div>
    <div id="admin-tab-users" class="hidden">
      <div class="bg-card border border-border rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-border">
          <span class="font-semibold">회원 목록</span>
        </div>
        <div id="admin-user-list"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
