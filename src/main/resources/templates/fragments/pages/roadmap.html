<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="roadmap" id="page-roadmap" class="page pt-16 min-h-screen">
  <div class="max-w-6xl mx-auto px-6 py-10">
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary/10 border border-primary/20 mb-5">
        <span class="text-lg">🗺️</span>
        <span class="text-primary text-sm font-medium">AI 취업 로드맵 설계</span>
      </div>
      <h1 class="text-3xl sm:text-4xl font-extrabold mb-3">나만의 취업 여정,<br><span class="gradient-text">AI가 설계해드립니다</span></h1>
      <p class="text-muted-foreground">현재 상황을 입력하면 복지 혜택까지 연결된 맞춤 로드맵을 만들어드려요</p>
    </div>

    <!-- 입력 섹션 -->
    <div id="roadmap-input-section" class="max-w-2xl mx-auto mb-10">
      <div class="bg-card border border-border rounded-2xl p-8">
        <div class="space-y-5">
          <div>
            <label class="text-xs text-muted-foreground uppercase tracking-wider mb-2 block font-medium">현재 상황을 자유롭게 알려주세요</label>
            <textarea id="roadmap-input" rows="4"
              class="w-full bg-background border border-border rounded-xl px-4 py-3 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none leading-relaxed"
              placeholder="예) 27살 문과 졸업, 백수 8개월째, 개발자 되고싶어. 부모님이랑 살고 알바 가끔 해요"></textarea>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-xs text-muted-foreground uppercase tracking-wider mb-2 block font-medium">목표 직군</label>
              <div class="flex flex-wrap gap-2" id="job-tags">
                <button onclick="toggleJobTag(this,'개발자')" class="job-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">💻 개발자</button>
                <button onclick="toggleJobTag(this,'디자이너')" class="job-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">🎨 디자이너</button>
                <button onclick="toggleJobTag(this,'마케터')" class="job-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">📢 마케터</button>
                <button onclick="toggleJobTag(this,'공무원')" class="job-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">🏛️ 공무원</button>
                <button onclick="toggleJobTag(this,'기타')" class="job-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">✨ 기타</button>
                <button id="job-tag-프리랜서" onclick="toggleJobTag(this,'프리랜서')" class="job-tag locked-job px-3 py-1.5 rounded-full border border-purple-500/30 text-xs text-purple-400/60 hover:border-purple-500/60 transition-all" data-locked="true">🔒 프리랜서</button>
                <button id="job-tag-유튜버" onclick="toggleJobTag(this,'유튜버')" class="job-tag locked-job px-3 py-1.5 rounded-full border border-red-500/30 text-xs text-red-400/60 hover:border-red-500/60 transition-all" data-locked="true">🔒 유튜버</button>
              </div>
              <input id="roadmap-job-text" type="text" placeholder="간호사, 건설, 회계사 등 직접 입력..."
                class="mt-2 w-full bg-background border border-border rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-muted-foreground/50"
                oninput="handleJobTextInput(this.value)">
            </div>
            <div>
              <label class="text-xs text-muted-foreground uppercase tracking-wider mb-2 block font-medium">목표 기간</label>
              <div class="flex gap-2" id="period-tags">
                <button onclick="togglePeriodTag(this,'3개월')" class="period-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">3개월</button>
                <button onclick="togglePeriodTag(this,'6개월')" class="period-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all active-period">6개월</button>
                <button onclick="togglePeriodTag(this,'1년')" class="period-tag px-3 py-1.5 rounded-full border border-border text-xs text-muted-foreground hover:border-primary/40 transition-all">1년</button>
              </div>
            </div>
          </div>
          <button onclick="generateRoadmap()" id="roadmap-btn"
            class="w-full py-3.5 bg-gradient-to-r from-primary to-cyan-400 text-background font-bold rounded-xl text-sm hover:shadow-lg hover:shadow-primary/30 transition-all flex items-center justify-center gap-2">
            <span>🚀 로드맵 설계하기</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 결과 섹션 -->
    <div id="roadmap-result" class="hidden">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
        <div class="bg-card border border-border rounded-2xl p-5">
          <div class="flex items-center gap-2 mb-4"><span class="text-lg">📊</span><h3 class="font-bold text-sm">내 상황 분석</h3></div>
          <div id="roadmap-analysis" class="space-y-2"></div>
        </div>
        <div class="md:col-span-2 bg-card border border-border rounded-2xl p-5">
          <div class="flex items-center gap-2 mb-4"><span class="text-lg">💰</span><h3 class="font-bold text-sm">지금 당장 신청할 복지</h3><span class="text-xs text-muted-foreground ml-auto">로드맵 시작 전 필수!</span></div>
          <div id="roadmap-welfare" class="space-y-2"></div>
        </div>
      </div>
      <div class="bg-card border border-border rounded-2xl p-6 mb-6">
        <div class="flex items-center gap-2 mb-3"><span class="text-lg">🗓️</span><h3 class="font-bold">취업 로드맵</h3><span id="roadmap-period-label" class="text-xs text-muted-foreground ml-2"></span></div>
        <div class="flex items-center gap-3 mb-6">
          <div class="flex-1 h-2 bg-muted rounded-full overflow-hidden">
            <div id="roadmap-progress-bar" class="h-2 bg-primary rounded-full transition-all duration-500" style="width:0%"></div>
          </div>
          <span id="roadmap-progress-text" class="text-xs text-muted-foreground whitespace-nowrap flex-shrink-0">0 / 0 완료</span>
        </div>
        <div id="roadmap-timeline"></div>
      </div>
      <div class="bg-card border border-border rounded-2xl p-6 mb-6" id="roadmap-cert-section">
        <div class="flex items-center gap-2 mb-2"><h3 class="font-bold">추천 자격증</h3><span class="text-xs text-muted-foreground">— 찜하면 캘린더에 시험 일정이 추가돼요</span></div>
        <p class="text-xs text-muted-foreground mb-5">직군과 상황에 따라 도움이 될 수 있는 자격증이에요. 필수는 아니지만 우대 조건이 되기도 해요.</p>
        <div id="roadmap-certs" class="space-y-3"></div>
      </div>
      <div class="flex items-center justify-center gap-3">
        <button onclick="shareRoadmap()" class="px-5 py-3 border border-border rounded-xl text-sm text-muted-foreground hover:text-foreground hover:bg-muted/50 transition-colors flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>공유</button>
        <button onclick="resetRoadmap()" class="px-6 py-3 border border-border rounded-xl text-sm text-muted-foreground hover:text-foreground hover:bg-muted/50 transition-colors">↺ 다시 설계하기</button>
        <button id="roadmap-pdf-btn" onclick="downloadPDF()" class="hidden px-6 py-3 bg-gradient-to-r from-primary to-cyan-400 text-background font-semibold rounded-xl text-sm hover:shadow-lg hover:shadow-primary/30 transition-all flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          PDF 저장
        </button>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="roadmap-loading" class="hidden">
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-3 px-6 py-3 rounded-2xl bg-card border border-border">
          <div class="relative w-8 h-8 flex-shrink-0">
            <div class="w-8 h-8 rounded-full border-2 border-border border-t-primary animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center text-sm">🗺️</div>
          </div>
          <div class="text-left">
            <p class="text-sm font-semibold text-foreground" id="roadmap-loading-msg">AI가 로드맵을 설계 중입니다</p>
            <div class="flex gap-1 mt-1">
              <div class="w-1 h-1 rounded-full bg-primary animate-bounce" style="animation-delay:0s"></div>
              <div class="w-1 h-1 rounded-full bg-primary animate-bounce" style="animation-delay:0.15s"></div>
              <div class="w-1 h-1 rounded-full bg-primary animate-bounce" style="animation-delay:0.3s"></div>
            </div>
          </div>
        </div>
      </div>
      <!-- 스켈레톤 월별 카드 -->
      <div class="space-y-4 max-w-4xl mx-auto">
        <div class="h-3 w-24 bg-muted animate-pulse rounded mx-auto mb-6"></div>
        <div class="bg-card border border-border rounded-2xl p-5">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded-xl bg-muted animate-pulse flex-shrink-0"></div>
            <div class="space-y-1.5 flex-1">
              <div class="h-4 w-32 bg-muted animate-pulse rounded"></div>
              <div class="h-2.5 w-20 bg-muted animate-pulse rounded"></div>
            </div>
            <div class="h-6 w-16 bg-muted animate-pulse rounded-full"></div>
          </div>
          <div class="space-y-2 pl-11">
            <div class="h-2.5 w-full bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-4/5 bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-3/5 bg-muted animate-pulse rounded"></div>
          </div>
        </div>
        <div class="bg-card border border-border rounded-2xl p-5 opacity-80">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded-xl bg-muted animate-pulse flex-shrink-0"></div>
            <div class="space-y-1.5 flex-1">
              <div class="h-4 w-28 bg-muted animate-pulse rounded"></div>
              <div class="h-2.5 w-24 bg-muted animate-pulse rounded"></div>
            </div>
            <div class="h-6 w-16 bg-muted animate-pulse rounded-full"></div>
          </div>
          <div class="space-y-2 pl-11">
            <div class="h-2.5 w-full bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-3/4 bg-muted animate-pulse rounded"></div>
          </div>
        </div>
        <div class="bg-card border border-border rounded-2xl p-5 opacity-60">
          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded-xl bg-muted animate-pulse flex-shrink-0"></div>
            <div class="space-y-1.5 flex-1">
              <div class="h-4 w-36 bg-muted animate-pulse rounded"></div>
              <div class="h-2.5 w-16 bg-muted animate-pulse rounded"></div>
            </div>
            <div class="h-6 w-16 bg-muted animate-pulse rounded-full"></div>
          </div>
          <div class="space-y-2 pl-11">
            <div class="h-2.5 w-full bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-2/3 bg-muted animate-pulse rounded"></div>
          </div>
        </div>
        <div class="bg-card border border-border rounded-2xl p-5 opacity-40">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl bg-muted animate-pulse flex-shrink-0"></div>
            <div class="space-y-1.5 flex-1">
              <div class="h-4 w-24 bg-muted animate-pulse rounded"></div>
              <div class="h-2.5 w-20 bg-muted animate-pulse rounded"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
