<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="diagnosis" id="page-diagnosis" class="page pt-16 flex-col" style="height:100vh">
  <div id="diag-layout" style="display:flex;flex:1;height:calc(100vh - 64px);overflow:hidden;">
    <div id="diag-left" class="bg-card border-r border-border flex flex-col overflow-y-auto" style="width:380px;min-width:240px;max-width:600px;flex-shrink:0;">
      <div class="p-8 flex flex-col gap-7 flex-1">
        <div>
          <button onclick="goPage('home')" class="text-xs text-muted-foreground hover:text-foreground mb-4 flex items-center gap-1 transition-colors">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            돌아가기
          </button>
          <div class="text-xs text-muted-foreground uppercase tracking-widest mb-3">AI 복지 자가진단</div>
          <h1 class="text-3xl font-extrabold leading-snug mb-3">내가 지금<br><span class="gradient-text">뭘 받을 수 있지?</span></h1>
          <p class="text-sm text-muted-foreground leading-relaxed">자연어로 입력하면 AI가 자격요건을 역추론합니다</p>
        </div>
        <div>
          <label class="text-xs text-muted-foreground uppercase tracking-wider mb-2 block">현재 상황을 입력하세요</label>
          <textarea id="diag-input" rows="6" class="w-full bg-background border border-border rounded-xl px-4 py-3 text-foreground placeholder:text-muted-foreground focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none text-sm leading-relaxed" placeholder="예) 졸업하고 6개월째 백수인데 부모님이랑 같이 살아요. 알바는 가끔 해요."></textarea>
          <button id="diag-btn" onclick="runDiagnosis()" class="mt-3 w-full py-3 bg-gradient-to-r from-primary to-cyan-400 text-background font-semibold rounded-xl text-sm hover:shadow-lg hover:shadow-primary/30 transition-all">분석하기 →</button>
        </div>
        <div>
          <div class="text-xs text-muted-foreground uppercase tracking-wider mb-3">예시 문장</div>
          <div class="flex flex-col gap-2">
            <button class="quick-prompt text-left px-4 py-3 bg-background border border-border rounded-xl text-xs text-muted-foreground hover:text-foreground hover:border-primary/40 transition-all leading-relaxed">졸업 후 6개월째 구직 중, 부모님과 함께 거주 중이에요</button>
            <button class="quick-prompt text-left px-4 py-3 bg-background border border-border rounded-xl text-xs text-muted-foreground hover:text-foreground hover:border-primary/40 transition-all leading-relaxed">27살 프리랜서인데 월수입이 100만원 정도고 자취해요</button>
            <button class="quick-prompt text-left px-4 py-3 bg-background border border-border rounded-xl text-xs text-muted-foreground hover:text-foreground hover:border-primary/40 transition-all leading-relaxed">취업 준비 2년차, 기초수급자 가정, 서울에 살아요</button>
          </div>
        </div>
      </div>
      <div class="p-6 border-t border-border text-xs text-muted-foreground leading-relaxed">데이터 출처 — 복지로 OpenAPI · 고용보험 공공데이터</div>
    </div>
    <!-- 드래그 핸들 -->
    <div id="diag-resizer" style="width:5px;background:transparent;cursor:col-resize;flex-shrink:0;transition:background .15s;position:relative;z-index:10;"
         onmouseenter="this.style.background='rgba(6,182,212,0.4)'"
         onmouseleave="this.style.background='transparent'">
    </div>
    <div class="bg-background overflow-y-auto flex flex-col" id="right-panel" style="flex:1;min-width:0;overflow-x:hidden;">
      <div id="s-empty" class="flex-1 flex flex-col items-center justify-center gap-4 p-12 text-center">
        <div class="w-14 h-14 rounded-2xl bg-card border border-border flex items-center justify-center"><svg class="w-6 h-6 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div>
        <div class="text-foreground font-medium">왼쪽에 상황을 입력하면<br>여기에 결과가 나타납니다</div>
      </div>
      <div id="s-loading" class="hidden flex-1 flex flex-col p-8 gap-7 overflow-y-auto">
        <!-- 스피너 + 단계 진행 -->
        <div class="flex flex-col items-center gap-5 pt-4">
          <div class="relative w-12 h-12 flex-shrink-0">
            <div class="w-12 h-12 rounded-full border-2 border-border border-t-primary animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
              <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            </div>
          </div>
          <div id="diag-loading-text" class="text-sm font-semibold text-foreground tracking-wide">AI가 분석 중입니다</div>
          <div class="flex gap-1.5 mt-1">
            <div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay:0s"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay:0.15s"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-primary animate-bounce" style="animation-delay:0.3s"></div>
          </div>
        </div>
        <!-- 스켈레톤 요약 바 -->
        <div class="grid grid-cols-3 bg-card border border-border rounded-xl overflow-hidden flex-shrink-0">
          <div class="px-5 py-4 border-r border-border space-y-2">
            <div class="h-7 w-10 bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-16 bg-muted animate-pulse rounded"></div>
          </div>
          <div class="px-5 py-4 border-r border-border space-y-2">
            <div class="h-7 w-20 bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-14 bg-muted animate-pulse rounded"></div>
          </div>
          <div class="px-5 py-4 space-y-2">
            <div class="h-7 w-12 bg-muted animate-pulse rounded"></div>
            <div class="h-2.5 w-16 bg-muted animate-pulse rounded"></div>
          </div>
        </div>
        <!-- 스켈레톤 카드 -->
        <div class="space-y-3">
          <div class="h-3 w-32 bg-muted animate-pulse rounded"></div>
          <div class="bg-card border-l-[3px] border-l-cyan-500/30 border border-border rounded-xl p-4 space-y-2">
            <div class="h-4 w-44 bg-muted animate-pulse rounded"></div>
            <div class="h-3 w-20 bg-muted animate-pulse rounded"></div>
            <div class="h-3 w-full bg-muted animate-pulse rounded mt-2"></div>
            <div class="h-3 w-4/5 bg-muted animate-pulse rounded"></div>
          </div>
          <div class="bg-card border-l-[3px] border-l-violet-500/30 border border-border rounded-xl p-4 space-y-2">
            <div class="h-4 w-36 bg-muted animate-pulse rounded"></div>
            <div class="h-3 w-24 bg-muted animate-pulse rounded"></div>
            <div class="h-3 w-full bg-muted animate-pulse rounded mt-2"></div>
            <div class="h-3 w-3/5 bg-muted animate-pulse rounded"></div>
          </div>
          <div class="bg-card border-l-[3px] border-l-amber-500/30 border border-border rounded-xl p-4 space-y-2 opacity-60">
            <div class="h-4 w-40 bg-muted animate-pulse rounded"></div>
            <div class="h-3 w-16 bg-muted animate-pulse rounded"></div>
            <div class="h-3 w-full bg-muted animate-pulse rounded mt-2"></div>
          </div>
        </div>
      </div>
      <div id="s-result" class="hidden flex-col flex-1">
        <div class="bg-card border-b border-border px-8 py-5">
          <div class="flex items-start gap-3">
            <span class="flex-shrink-0 px-2 py-1 bg-primary text-background text-xs font-bold rounded-lg">AI</span>
            <p id="r-parse" class="text-sm text-muted-foreground leading-relaxed flex-1"></p>
            <button onclick="resetDiagnosis()" class="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 border border-border rounded-lg text-xs text-muted-foreground hover:text-primary hover:border-primary/40 transition-all">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              다시 진단하기
            </button>
          </div>
        </div>
        <div class="grid grid-cols-3 bg-card border-b border-border">
          <div class="px-8 py-5 border-r border-border"><div id="r-count" class="text-3xl font-bold text-primary"></div><div class="text-xs text-muted-foreground mt-1">신청 가능 혜택</div></div>
          <div class="px-8 py-5 border-r border-border"><div id="r-amount" class="text-3xl font-bold text-foreground"></div><div class="text-xs text-muted-foreground mt-1">연간 최대 수혜액</div></div>
          <div class="px-8 py-5"><div id="r-deadline" class="text-3xl font-bold text-destructive"></div><div class="text-xs text-muted-foreground mt-1">가장 빠른 마감</div></div>
        </div>
        <div class="p-8 flex-1">
          <div id="r-title" class="text-xs font-medium text-muted-foreground uppercase tracking-widest mb-5"></div>
          <div id="r-cards" class="space-y-4"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
