<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" id="site-header" class="fixed top-0 left-0 right-0 z-50 border-b border-border/50 bg-background/80 backdrop-blur-xl">
  <div class="max-w-7xl mx-auto px-2">
    <div class="flex items-center justify-between h-16">
      <!-- 로고 -->
      <a href="#" onclick="goPage('home')" class="flex items-center gap-3 cursor-pointer">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary to-primary-hover flex items-center justify-center shadow-lg shadow-primary/20">
          <svg class="w-5 h-5 text-background" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <span class="text-xl font-bold">복지<span class="text-primary">체크</span></span>
      </a>

      <!-- 네비 -->
      <nav class="hidden md:flex items-center gap-6">
        <button onclick="goPage('welfare');if(typeof loadWelfareData==='function')loadWelfareData();" style="border:none;background:transparent;" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-medium">복지서비스</button>
        <button onclick="requireLoginThenCommunity()" style="border:none;background:transparent;" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-medium relative">커뮤니티<span id="notice-nav-badge" class="hidden absolute -top-1 -right-3 w-4 h-4 bg-destructive text-background text-[9px] font-bold rounded-full flex items-center justify-center"></span></button>
        <button onclick="requireLoginThenRoadmap()" style="border:none;background:transparent;" class="text-muted-foreground hover:text-foreground transition-colors text-sm font-medium">취업 로드맵</button>
        <button id="nav-admin-btn" onclick="goPage('admin')" class="hidden text-destructive/80 hover:text-destructive transition-colors text-sm font-medium">관리자</button>
      </nav>

      <!-- 우측 액션 -->
      <div class="flex items-center gap-2">
        <!-- 더보기 -->
        <button onclick="toggleDrawer()" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center hover:bg-muted/50 transition-colors" title="더보기"><svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <!-- 가이드 / 다크모드 -->
        <button onclick="showOnboarding()" class="hidden md:flex w-9 h-9 rounded-xl border border-border items-center justify-center hover:bg-muted/50 transition-colors" title="이용 가이드"><svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
        <button onclick="toggleDarkMode()" id="dark-mode-btn" class="hidden md:flex w-9 h-9 rounded-xl border border-border items-center justify-center hover:bg-muted/50 transition-colors" title="다크/라이트 모드">
          <svg id="dark-icon" class="w-4 h-4 text-muted-foreground hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg id="light-icon" class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <div id="nav-guest" class="flex items-center gap-2">
          <button onclick="openModal('modal-login')" class="px-4 py-2 text-sm text-muted-foreground hover:text-foreground border border-border rounded-xl transition-colors">로그인</button>
        </div>
        <div id="nav-user" class="hidden items-center gap-3">
          <button onclick="goPage('calendar')" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center hover:bg-muted/50 transition-colors" title="캘린더">
            <svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </button>
          <button onclick="openMyPage()" class="w-9 h-9 rounded-xl border border-border flex items-center justify-center hover:bg-muted/50 transition-colors" title="내 정보">
            <svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </button>
          <span class="text-sm text-muted-foreground hidden md:inline">안녕하세요, <span id="nav-username" class="text-foreground font-medium"></span>님</span>
          <button onclick="logout()" class="px-4 py-2 text-sm text-muted-foreground hover:text-foreground border border-border rounded-xl transition-colors">로그아웃</button>
        </div>
        <button onclick="requireLoginThenDiagnosis()" class="hidden sm:inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-primary to-cyan-400 text-background font-semibold rounded-xl hover:shadow-lg hover:shadow-primary/30 transition-all hover:-translate-y-0.5 text-sm">
          진단 시작
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>
</body>
</html>
